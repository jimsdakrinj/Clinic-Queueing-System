<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - QKlinik</title>
    <link rel="stylesheet" href="../designs/Login.css" />
  </head>
  <body>
    <div class="page-container translucent-outer-box">
      <div class="login-card">
        <div class="logo">
          <img src="../img/Logo.png" alt="QKlinik Logo" class="logopicture">
          <h1 class="site-title">QKlinik</h1>
        </div>
        <div class="subtitle">Login or signup below</div>

        <form>
          <div class="form-group">
            <label for="email">
              Email
              <a href="#">Forgot password?</a>
            </label>
            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              required
            />
            <label for="password"> Password </label>
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
          </div>
          <button type="submit" class="continue-btn">Continue</button>
        </form>

        <div class="otherlogins">Or Continue with</div>

        <div class="social-login" aria-label="Social login options">
          <button type="button" class="social-btn" aria-label="Continue with Apple">
            <svg
              class="social-logo apple-logo"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path
                d="M17.1 12.4c0-2.1 1.7-3.1 1.8-3.2-1-1.4-2.5-1.6-3-1.6-1.3-.1-2.5.8-3.1.8-.7 0-1.6-.8-2.7-.7-1.4 0-2.7.8-3.4 2.1-1.5 2.6-.4 6.3 1.1 8.4.7 1 1.5 2.2 2.6 2.1 1.1 0 1.5-.7 2.8-.7s1.7.7 2.8.7c1.2 0 1.9-1 2.6-2.1.8-1.2 1.2-2.4 1.2-2.5 0-.1-2.7-1.1-2.7-3.3ZM15 6.2c.6-.7 1-1.7.9-2.7-.9 0-1.9.6-2.5 1.3-.6.7-1 1.7-.9 2.6.9.1 1.9-.5 2.5-1.2Z"
              />
            </svg>
          </button>

          <button type="button" class="social-btn" aria-label="Continue with Google">
            <svg
              class="social-logo google-logo"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path
                fill="#4285f4"
                d="M21.8 12.2c0-.7-.1-1.3-.2-1.9H12v3.6h5.5c-.2 1.2-1 2.3-2.1 3v2.4h3.1c1.8-1.7 3.3-4.1 3.3-7.1Z"
              />
              <path
                fill="#34a853"
                d="M12 22c2.6 0 4.8-.9 6.4-2.4l-3.1-2.4c-.9.6-2 .9-3.3.9-2.5 0-4.6-1.7-5.4-3.9H3.4v2.5C5 19.8 8.2 22 12 22Z"
              />
              <path
                fill="#fbbc05"
                d="M6.6 14.1c-.2-.6-.3-1.3-.3-2.1s.1-1.5.3-2.1V7.4H3.4C2.8 8.8 2.4 10.3 2.4 12s.4 3.2 1 4.6l3.2-2.5Z"
              />
              <path
                fill="#ea4335"
                d="M12 5.9c1.4 0 2.7.5 3.7 1.5l2.8-2.8C16.8 3 14.6 2 12 2 8.2 2 5 4.2 3.4 7.4l3.2 2.5c.8-2.3 2.9-4 5.4-4Z"
              />
            </svg>
          </button>

          <button type="button" class="social-btn" aria-label="Continue with Microsoft">
            <span class="microsoft-logo" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>
        </div>

        <div class="footer-links">
          <a href="#">Terms of Service</a>
          <a href="#">Privacy Policy</a>
        </div>
      </div>
    </div>
  </body>
</html>
